<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/css/syntax.css" | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/youmoo-logo.svg' | relative_url }}">
    <link rel="icon" sizes="32x32" href="{{ '/assets/favicon.ico' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
    <style>
      article img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
      }
    </style>
    {% feed_meta %}
    {% seo %}
    {% if page.tags %}
      {% for tag in page.tags %}
        <meta property="article:tag" content="{{ tag | escape }}">
      {% endfor %}
    {% endif %}
    {% include json-ld-enhance.html %}
  </head>
  <body>
    <div class="container" style="min-height: 100vh; display: flex; flex-direction: column;">
      <div style="flex: 1;">
        {{ content }}
      </div>
      <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid #333; font-size: 0.9rem;">
        <a href="{{ '/' | relative_url }}" style="color: #888; text-decoration: none;">&copy; 2026 Youmoo</a>
      </footer>
    </div>
  </body>
</html>
