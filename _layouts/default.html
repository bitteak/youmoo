<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">
    <link rel="alternate icon" href="{{ \"/favicon.ico\" | relative_url }}">
    {% seo %}
  </head>
  <body>
    <div class="container" style="min-height: 100vh; display: flex; flex-direction: column;">
      <div style="flex: 1;">
        {{ content }}
      </div>
      <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid #333; font-size: 0.9rem;">
        <a href="{{ '/' | relative_url }}" style="color: #888; text-decoration: none;">&copy; 2026 Youmoo</a>
      </footer>
    </div>
  </body>
</html>
