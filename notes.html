---
layout: default
title: Notes
permalink: /notes/
---

<header>
  <h1>Notes</h1>
  <p class="secondary"><a href="{{ '/' | relative_url }}">&larr; Back to Home</a></p>
</header>

<section class="posts-list">
  <ul style="list-style: none; padding: 0;">
    {% assign reversed_notes = site.notes | reverse %}
    {% for note in reversed_notes %}
      <li style="margin-bottom: 1.5rem; display: flex; flex-direction: column;">
        <span class="post-date" style="color: #888888; font-size: 0.9rem; margin-bottom: 0.2rem;">{{ note.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ note.url | relative_url }}" style="text-decoration: none; font-weight: 500; font-size: 1.1rem;">{{ note.title }}</a>
      </li>
    {% endfor %}
  </ul>
</section>
