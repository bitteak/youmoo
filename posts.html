---
layout: default
title: Posts
permalink: /posts/
---

<header>
  <h1>Posts</h1>
  <p class="secondary"><a href="{{ '/' | relative_url }}">&larr; Back to Home</a></p>
</header>

<section class="posts-list">
  <ul style="list-style: none; padding: 0;">
    {% for post in site.posts %}
      <li style="margin-bottom: 1.5rem; display: flex; flex-direction: column;">
        <span class="post-date" style="color: #888888; font-size: 0.9rem; margin-bottom: 0.2rem;">{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url | relative_url }}" style="text-decoration: none; font-weight: 500; font-size: 1.1rem;">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
</section>

<footer class="footer" style="margin-top: 3rem;">
  &copy; {{ site.time | date: '%Y' }} Youmoo
</footer>
