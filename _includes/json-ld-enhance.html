<!-- Supplementary JSON-LD for SEO/GEO: keywords, language, word count -->
{% if page.date and page.tags[0] %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "@id": "{{ '/' | absolute_url }}#website",
  "keywords": [{% for tag in page.tags %}"{{ tag | escape }}"{% unless forloop.last %}, {% endunless %}{% endfor %}],
  "inLanguage": "{{ site.lang | default: "zh-CN" }}"
}
</script>
{% endif %}
